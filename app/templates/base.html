<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>{{ brand }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{--bg:#0f1115;--card:#171a21;--accent:#6c5ce7;--text:#e6e6ea;--muted:#8b8fa3;--danger:#ff5c5c;--ok:#2ecc71}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
  a{color:inherit;text-decoration:none}
  .layout{display:flex;min-height:100vh}
  nav{width:220px;background:#12141a;padding:24px 16px;border-right:1px solid #232733}
  nav h1{font-size:20px;margin:0 0 24px;color:var(--accent)}
  nav a{display:block;padding:10px 12px;border-radius:8px;margin-bottom:4px;color:var(--muted)}
  nav a:hover,nav a.active{background:var(--accent);color:#fff}
  main{flex:1;padding:32px}
  .card{background:var(--card);border-radius:14px;padding:20px;margin-bottom:20px;border:1px solid #232733}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
  .stat-value{font-size:28px;font-weight:700}
  .stat-label{color:var(--muted);font-size:13px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px;border-bottom:1px solid #232733;font-size:14px}
  input[type=text],input[type=password]{width:100%;padding:10px;border-radius:8px;border:1px solid #2a2f3d;background:#0f1115;color:var(--text);margin-bottom:12px}
  button{background:var(--accent);border:none;color:#fff;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:600}
  button.danger{background:var(--danger)}
  .flash{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px}
  .flash.error{background:#3a1f24;color:var(--danger)}
  .flash.success{background:#1c3a2a;color:var(--ok)}
  .footer{color:var(--muted);font-size:12px;text-align:center;padding:16px}
  label{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="layout">
  <nav>
    <h1>⚡ {{ brand }}</h1>
    <a href="{{ url_for('dashboard') }}">📊 Обзор</a>
    <a href="{{ url_for('domains') }}">🌐 Домены</a>
    <a href="{{ url_for('ftp_accounts') }}">📁 FTP</a>
    <a href="{{ url_for('logout') }}">🚪 Выход</a>
  </nav>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
    <div class="footer">{{ footer }}</div>
  </main>
</div>
</body>
</html>
