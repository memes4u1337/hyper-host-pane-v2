{% extends "base.html" %}
{% block content %}
<h2>FTP-аккаунты</h2>
<div class="card">
  <form method="post">
    <label>Логин</label>
    <input type="text" name="username" placeholder="myftpuser" required>
    <label>Пароль</label>
    <input type="password" name="password" required>
    <button type="submit">Создать FTP-аккаунт</button>
  </form>
</div>
<div class="card">
  <table>
    <tr><th>Логин</th><th>Домашняя папка</th><th>Создан</th><th></th></tr>
    {% for a in accounts %}
    <tr>
      <td>{{ a.username }}</td>
      <td>{{ a.home_dir }}</td>
      <td>{{ a.created_at[:16] }}</td>
      <td>
        <form method="post" action="{{ url_for('delete_ftp', account_id=a.id) }}" onsubmit="return confirm('Удалить FTP-аккаунт {{ a.username }}?')">
          <button class="danger" type="submit">Удалить</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
