<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>{{ brand }} — вход</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1115;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
  .box{background:#171a21;padding:36px;border-radius:16px;width:320px;border:1px solid #232733}
  h1{color:#6c5ce7;text-align:center;margin-top:0}
  input{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2f3d;background:#0f1115;color:#e6e6ea;margin-bottom:14px;box-sizing:border-box}
  button{width:100%;background:#6c5ce7;border:none;color:#fff;padding:12px;border-radius:8px;cursor:pointer;font-weight:600}
  .flash{background:#3a1f24;color:#ff5c5c;padding:10px;border-radius:8px;margin-bottom:14px;font-size:13px}
  .footer{color:#8b8fa3;font-size:12px;text-align:center;margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <h1>⚡ {{ brand }}</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="post">
    <input type="text" name="username" placeholder="Логин" required autofocus>
    <input type="password" name="password" placeholder="Пароль" required>
    <button type="submit">Войти</button>
  </form>
  <div class="footer">{{ footer }}</div>
</div>
</body>
</html>
